<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <header>
            <h1>Task Flow</h1>
            <p class="subtitle">오늘 할 일을 단정하게 정리해보세요.</p>
        </header>

        <section class="date-navigation">
            <button id="prev-date-btn" class="nav-btn">&lt;</button>
            <h2 id="current-date-display">2026년 06월 01일</h2>
            <button id="next-date-btn" class="nav-btn">&gt;</button>
        </section>

        <section class="input-section">
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요..." autocomplete="off">
                <button type="submit" id="add-btn">추가</button>
            </form>
            <p id="error-message" class="error-message"></p>
        </section>

        <section class="filter-section">
            <button class="filter-btn active" data-filter="all">전체</button>
            <button class="filter-btn" data-filter="active">진행 중</button>
            <button class="filter-btn" data-filter="completed">완료</button>
        </section>

        <section class="list-section">
            <ul id="todo-list">
                </ul>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
