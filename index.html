<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="date-navigator">
            <button id="prev-date-btn" class="nav-btn">&lt;</button>
            <h1 id="current-date-display">2026년 06월 01일</h1>
            <button id="next-date-btn" class="nav-btn">&gt;</button>
        </div>

        <div class="input-section">
            <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." autocomplete="off">
            <button id="add-button">추가</button>
        </div>

        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">전체</button>
            <button class="filter-btn" data-filter="active">진행 중</button>
            <button class="filter-btn" data-filter="completed">완료</button>
        </div>

        <ul id="todo-list">
            </ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
